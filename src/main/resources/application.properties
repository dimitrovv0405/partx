spring.application.name=partx
thymeleaf.prefix=file:./src/main/resources/templates/
thymeleaf.resources.static-locations=file:./src/main/resources/static/

# Base configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/partx_db?createDatabaseIfNotExist=true
spring.datasource.username=${db_username}
spring.datasource.password=${db_password}
logging.level.org.hibernate.persister.entity=ERROR

spring.mvc.hiddenmethod.filter.enable=true